# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: OpenAB Review Council (PAT)
spec:
  description: |
    PAT quickstart for a self-hosted, CodeRabbit-style PR-review council: a
    control plane + 3 stock OpenAB Claude pods deliberate on a PR and post one
    verdict as your GitHub account. After deploy, copy examples/pr-review.yml into
    the target repo and set COUNCIL_PLANE / COUNCIL_KEY. Do not also configure the
    webhook trigger on the same repo. See docs/install-pat.md.
  readme: |
    # OpenAB Review Council (PAT)

    Use this template when you want the fastest install path: a copied GitHub
    Action triggers the council, and the chair posts the verdict with your
    fine-grained PAT.

    It deploys a control plane plus 3 stock OpenAB Claude pods (1 chair + 2
    reviewers). No per-bot setup is needed; every pod uses the same Claude Code
    OAuth token.

    ## Required variables

    - `PUBLIC_DOMAIN`: the control-plane domain, for example `my-council`.
    - `CLAUDE_CODE_OAUTH_TOKEN`: from `claude setup-token`.
    - `GH_TOKEN`: fine-grained PAT for the chair. Grant the target repo
      `Pull requests: Read and write` and `Contents: Read-only`.
    - `BOT_TOKEN_CHAIR`, `BOT_TOKEN_REV1`, `BOT_TOKEN_REV2`: one gateway token per
      pod, each `openssl rand -hex 32`. The plane stores only their hashes and
      serves `token = "${OABCP_BOT_TOKEN}"` in `/bot-config` — so an unauthenticated
      config fetch leaks nothing (ADR 016). Use three distinct values.

    ## Install the copied Action

    1. Deploy this template and wait until `control-plane`, `chair`, `rev1`, and
       `rev2` are running.
    2. Open the `control-plane` service variables and copy `OABCP_API_KEY`; it is
       the generated `PASSWORD` value.
    3. Copy `examples/pr-review.yml` from the source repo into the target repo at
       `.github/workflows/pr-review.yml`:
       `https://github.com/canyugs/openab-control-plane/blob/main/examples/pr-review.yml`
    4. Set the target repo secrets:

       ```sh
       gh secret set COUNCIL_PLANE --body "https://my-council.zeabur.app"
       gh secret set COUNCIL_KEY --body "<OABCP_API_KEY>"
       ```

    ## Triggers

    - Automatic: PR opened, updated, reopened, or marked ready for review.
    - Manual: an OWNER / MEMBER / COLLABORATOR comments `/review` on the PR.
    - Manual fallback: run the copied workflow with `workflow_dispatch` and a PR
      number.

    The chair posts one verdict comment as the PAT owner.

    ## Steering

    Every bot pod fetches `docs/steering/pr-review.md` at boot via
    `[hooks.pre_seed]`, which downloads `steering.zip` from object storage and
    extracts `/home/node/AGENTS.md` (the deployment-owned steering channel). One
    upload updates every pod — set `STEERING_R2_*` creds and the pre_seed
    `endpoint_url`/`sources` for your bucket. The plane never serves steering
    itself; to iterate, re-upload the zip and restart the pods.

    ## Verify

    1. Open or update a PR in the target repo.
    2. Confirm the target repo's `Council Review` GitHub Action succeeds.
    3. Check the PR for one council verdict comment.
    4. If there is no verdict, check the `control-plane` and `chair` service logs.

    Use this PAT template or the GitHub App webhook template, not both on one repo,
    or one PR event can convene two councils.

    For private repos, reviewer pods also need read access to fetch the PR diff.
    Public repos work anonymously. Full guide:
    `https://github.com/canyugs/openab-control-plane/blob/main/docs/install-pat.md`
  icon: https://cdn-console.zeabur.com/f/6qNF8/ocp-icon.webp
  tags:
    - AI
    - Developer Tools
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Control plane domain
      description: Public domain for the control plane's REST/SSE API.
    - key: CLAUDE_CODE_OAUTH_TOKEN
      type: PASSWORD
      name: Claude Code OAuth Token
      description: Agent auth for every pod. From `claude setup-token` (or use ANTHROPIC_API_KEY).
    - key: GH_TOKEN
      type: PASSWORD
      name: GitHub Token (chair only)
      description: Fine-grained PAT so the chair can comment/label/approve PRs.
    - key: BOT_TOKEN_CHAIR
      type: PASSWORD
      name: chair gateway token
      description: Per-bot WS token for the chair pod. Generate with `openssl rand -hex 32`.
    - key: BOT_TOKEN_REV1
      type: PASSWORD
      name: rev1 gateway token
      description: Per-bot WS token for the rev1 pod. Generate with `openssl rand -hex 32`.
    - key: BOT_TOKEN_REV2
      type: PASSWORD
      name: rev2 gateway token
      description: Per-bot WS token for the rev2 pod. Generate with `openssl rand -hex 32`.
  services:
    - name: control-plane
      icon: https://cdn-console.zeabur.com/f/6qNF8/ocp-icon.webp
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: ghcr.io/canyugs/openab-control-plane:0.1.37
        ports:
          - id: web
            port: 8090
            type: HTTP
        healthCheck:
          type: HTTP
          port: web
          http:
            path: /healthz
        volumes:
          - id: data
            dir: /data
        env:
          OABCP_ADDR:
            default: 0.0.0.0:8090
          OABCP_DB:
            default: /data/plane.db
          OABCP_API_KEY:
            default: ${PASSWORD}
            expose: true
            readonly: true
          OABCP_WS_URL:
            default: ws://control-plane.zeabur.internal:8090/ws
          OABCP_BOTS:
            default: chair:chair,rev1:reviewer,rev2:reviewer
          OABCP_EXTERNALIZE_TOKENS:
            default: "1"
          OABCP_BOT_TOKEN_CHAIR:
            default: ${BOT_TOKEN_CHAIR}
          OABCP_BOT_TOKEN_REV1:
            default: ${BOT_TOKEN_REV1}
          OABCP_BOT_TOKEN_REV2:
            default: ${BOT_TOKEN_REV2}

    - name: chair
      icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
      template: PREBUILT_V2
      dependencies:
        - control-plane
      spec:
        source:
          # Single source of truth for the OpenAB pod image. rev1/rev2 alias this
          # (*openab_image), so a version bump is one edit here and the three pods
          # can never drift onto mismatched tags.
          image: &openab_image ghcr.io/openabdev/openab:0.9.0-beta.7-claude
          command:
            - openab
            - run
            - -c
            - /etc/openab/config.toml
        volumes:
          - id: home
            dir: /home/node
        configs:
          # Pod-owned OpenAB config (ADR 010 B2 demotion). Byte-synced with
          # docs/pod-config/pod-config-chair.toml by tests/pod_config_sync.rs.
          - path: /etc/openab/config.toml
            template: &pod_config_chair |
              # Pod-owned OpenAB config (ADR 010 B2 demotion execution, 2026-07-09).
              # Mounted at /etc/openab/config.toml — the upstream image-CMD convention.
              # Byte-synced into both Zeabur templates by tests/pod_config_sync.rs.
              #
              # Philosophy (upstream ADR "configurl-over-helm-rendering"): the config file
              # is a shareable, credential-free artifact. Secrets and per-pod identity
              # arrive via OpenAB's whole-file ${VAR} env expansion at boot —
              # ${OABCP_BOT_TOKEN} and ${OABCP_BOT_NAME} come from the pod's own env.
              #
              # Deliberately absent: [agent] command / args / working_dir. Every published
              # openab image variant bakes its own OPENAB_AGENT_COMMAND (claude /
              # "kiro-cli acp --trust-all-tools" / codex-acp) and HOME, and OpenAB falls
              # back to them when the config stays silent — so this file can never pin an
              # agent the image does not contain. Baking the agent into fetched config is
              # exactly what killed the prod lane (2026-07: /bot-config served the default
              # claude profile to kiro images; every spawn failed "Agent Not Found").

              [gateway]
              url = "ws://control-plane.zeabur.internal:8090/ws"
              platform = "feishu"
              token = "${OABCP_BOT_TOKEN}"
              # Explicit: survives OAB's trust-pyramid Phase 3 default flip (L3 deny-all).
              # This surface is private and token-authed; senders are the plane itself
              # ("client"/"system") plus roster bots, and the roster is dynamic — an
              # allowed_users list would go stale after recruit/replace. The WS token is
              # the trust boundary, not sender ids.
              allow_all_users = true
              allow_bot_messages = true
              bot_username = "${OABCP_BOT_NAME}"
              streaming = true
              # OCP backfill and council cross-talk intentionally arrive as in-thread bursts;
              # per-thread mode lets OAB batch that burst into one context turn.
              message_processing_mode = "per-thread"

              [agent]
              # Whitelist only — OpenAB builds the agent child env from this list (plus any
              # explicit [agent].env); the credential values live in the pod env, never here.
              inherit_env = ["CLAUDE_CODE_OAUTH_TOKEN", "ANTHROPIC_API_KEY", "OPENAI_API_KEY", "GEMINI_API_KEY", "GROK_CODE_XAI_API_KEY", "KIRO_API_KEY", "COPILOT_GITHUB_TOKEN", "GH_TOKEN"]

              [pool]
              max_sessions = 4
              session_ttl_hours = 2

              [reactions]
              # A6: a cosmetic OAB flag must not be able to erase quorum votes.
              remove_after_reply = false

              [hooks.pre_seed]
              # Central steering delivery (ADR 003 pull model): the canonical steering doc
              # lives in R2 as steering.zip {AGENTS.md}; each pod fetches it at boot. One
              # upload updates every pod, no per-pod push. R2 creds arrive as pod env
              # (AWS_ACCESS_KEY_ID/_SECRET, region=auto) and are deliberately NOT in
              # [agent].inherit_env — the untrusted review agent never sees them.
              sources = ["s3://zeabur-openab-steering/steering.zip"]
              target = "/home/node"
              region = "auto"
              endpoint_url = "https://154bae79a67da12bf2d18e5892f84c4f.r2.cloudflarestorage.com"
              on_failure = "abort"

              [hooks.pre_boot]
              # GitHub auth via the plane (ADR 019 D1). The plane mints this pod's GitHub token
              # — chair -> pull_requests:write, reviewer -> read-only — from the App key it
              # holds, authenticated by the pod's own ${OABCP_BOT_TOKEN}. The role is derived
              # server-side from the bot record, never asked for. The App private key never
              # touches this pod, so an agent that ingests untrusted PR content can at worst
              # steal one <=1h role-scoped token, not the key to mint installation-wide tokens.
              # Warn-and-continue if the plane is in PAT mode (no App) or unreachable.
              on_failure = "abort"
              timeout_seconds = 60
              inline = '''
              #!/bin/sh
              PLANE_TOKEN_URL="http://control-plane.zeabur.internal:8090/v1/bots/github-token"
              auth() {
                tok=$(curl -fsS -X POST -H "Authorization: Bearer ${OABCP_BOT_TOKEN}" -H "Accept: text/plain" "$PLANE_TOKEN_URL" 2>/dev/null)
                if [ -z "$tok" ]; then echo "no github token from plane (PAT mode or plane error); skipping gh auth"; return 1; fi
                printf '%s' "$tok" | gh auth login --with-token
              }
              if auth; then
                git config --global credential.helper '!gh auth git-credential' || true
                # Refresh every 15 min: with the plane minting fresh (SEI-810) this keeps
                # >=45 min remaining at all times — a mid-round expiry needs a >45min round
                ( while sleep 900; do auth || true; done ) &
              fi
              '''
          # Deployment-owned steering channel (design.md: agent steering is the
          # bot deployer's job; the plane must not serve it from /bot-config).
          # Content is byte-synced with docs/steering/pr-review.md by
          # tests/steering_sync.rs — edit the doc, then re-paste here.
        env:
          CLAUDE_CODE_OAUTH_TOKEN:
            default: ${CLAUDE_CODE_OAUTH_TOKEN}
          GH_TOKEN:
            default: ${GH_TOKEN}
          OABCP_BOT_TOKEN:
            default: ${BOT_TOKEN_CHAIR}
          OABCP_BOT_NAME:
            default: chair
          AWS_ACCESS_KEY_ID:
            default: ${STEERING_R2_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY:
            default: ${STEERING_R2_SECRET_ACCESS_KEY}
          AWS_REGION:
            default: auto

    - name: rev1
      icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
      template: PREBUILT_V2
      dependencies:
        - control-plane
      spec:
        source:
          image: *openab_image
          command:
            - openab
            - run
            - -c
            - /etc/openab/config.toml
        configs:
          # Byte-synced with docs/pod-config/pod-config-reviewer.toml
          # by tests/pod_config_sync.rs.
          - path: /etc/openab/config.toml
            template: &pod_config_reviewer |
              # Pod-owned OpenAB config (ADR 010 B2 demotion execution, 2026-07-09).
              # Mounted at /etc/openab/config.toml — the upstream image-CMD convention.
              # Byte-synced into both Zeabur templates by tests/pod_config_sync.rs.
              #
              # Philosophy (upstream ADR "configurl-over-helm-rendering"): the config file
              # is a shareable, credential-free artifact. Secrets and per-pod identity
              # arrive via OpenAB's whole-file ${VAR} env expansion at boot —
              # ${OABCP_BOT_TOKEN} and ${OABCP_BOT_NAME} come from the pod's own env.
              #
              # Deliberately absent: [agent] command / args / working_dir. Every published
              # openab image variant bakes its own OPENAB_AGENT_COMMAND (claude /
              # "kiro-cli acp --trust-all-tools" / codex-acp) and HOME, and OpenAB falls
              # back to them when the config stays silent — so this file can never pin an
              # agent the image does not contain. Baking the agent into fetched config is
              # exactly what killed the prod lane (2026-07: /bot-config served the default
              # claude profile to kiro images; every spawn failed "Agent Not Found").

              [gateway]
              url = "ws://control-plane.zeabur.internal:8090/ws"
              platform = "feishu"
              token = "${OABCP_BOT_TOKEN}"
              # Explicit: survives OAB's trust-pyramid Phase 3 default flip (L3 deny-all).
              # This surface is private and token-authed; senders are the plane itself
              # ("client"/"system") plus roster bots, and the roster is dynamic — an
              # allowed_users list would go stale after recruit/replace. The WS token is
              # the trust boundary, not sender ids.
              allow_all_users = true
              allow_bot_messages = true
              bot_username = "${OABCP_BOT_NAME}"
              streaming = true
              # OCP backfill and council cross-talk intentionally arrive as in-thread bursts;
              # per-thread mode lets OAB batch that burst into one context turn.
              message_processing_mode = "per-thread"

              [agent]
              # Whitelist only — OpenAB builds the agent child env from this list (plus any
              # explicit [agent].env); the credential values live in the pod env, never here.
              inherit_env = ["CLAUDE_CODE_OAUTH_TOKEN", "ANTHROPIC_API_KEY", "OPENAI_API_KEY", "GEMINI_API_KEY", "GROK_CODE_XAI_API_KEY", "KIRO_API_KEY", "COPILOT_GITHUB_TOKEN", "GH_TOKEN"]

              [pool]
              max_sessions = 4
              session_ttl_hours = 2

              [reactions]
              # A6: a cosmetic OAB flag must not be able to erase quorum votes.
              remove_after_reply = false

              [hooks.pre_seed]
              # Central steering delivery (ADR 003 pull model): the canonical steering doc
              # lives in R2 as steering.zip {AGENTS.md}; each pod fetches it at boot. One
              # upload updates every pod, no per-pod push. R2 creds arrive as pod env
              # (AWS_ACCESS_KEY_ID/_SECRET, region=auto) and are deliberately NOT in
              # [agent].inherit_env — the untrusted review agent never sees them.
              sources = ["s3://zeabur-openab-steering/steering.zip"]
              target = "/home/node"
              region = "auto"
              endpoint_url = "https://154bae79a67da12bf2d18e5892f84c4f.r2.cloudflarestorage.com"
              on_failure = "abort"

              [hooks.pre_boot]
              # GitHub auth via the plane (ADR 019 D1). The plane mints this pod's GitHub token
              # — chair -> pull_requests:write, reviewer -> read-only — from the App key it
              # holds, authenticated by the pod's own ${OABCP_BOT_TOKEN}. The role is derived
              # server-side from the bot record, never asked for. The App private key never
              # touches this pod, so an agent that ingests untrusted PR content can at worst
              # steal one <=1h role-scoped token, not the key to mint installation-wide tokens.
              # Warn-and-continue if the plane is in PAT mode (no App) or unreachable.
              on_failure = "abort"
              timeout_seconds = 60
              inline = '''
              #!/bin/sh
              PLANE_TOKEN_URL="http://control-plane.zeabur.internal:8090/v1/bots/github-token"
              auth() {
                tok=$(curl -fsS -X POST -H "Authorization: Bearer ${OABCP_BOT_TOKEN}" -H "Accept: text/plain" "$PLANE_TOKEN_URL" 2>/dev/null)
                if [ -z "$tok" ]; then echo "no github token from plane (PAT mode or plane error); skipping gh auth"; return 1; fi
                printf '%s' "$tok" | gh auth login --with-token
              }
              if auth; then
                git config --global credential.helper '!gh auth git-credential' || true
