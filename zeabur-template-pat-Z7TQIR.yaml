                # >=45 min remaining at all times — a mid-round expiry needs a >45min round
                ( while sleep 900; do auth || true; done ) &
              fi
              '''
        env:
          CLAUDE_CODE_OAUTH_TOKEN:
            default: ${CLAUDE_CODE_OAUTH_TOKEN}
          OABCP_BOT_TOKEN:
            default: ${BOT_TOKEN_REV1}
          OABCP_BOT_NAME:
            default: rev1
          AWS_ACCESS_KEY_ID:
            default: ${STEERING_R2_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY:
            default: ${STEERING_R2_SECRET_ACCESS_KEY}
          AWS_REGION:
            default: auto

    - name: rev2
      icon: https://cdn-console.zeabur.com/f/0Ewi6/openab-icon.webp
      template: PREBUILT_V2
      dependencies:
        - control-plane
      spec:
        source:
          image: *openab_image
          command:
            - openab
            - run
            - -c
            - /etc/openab/config.toml
        configs:
          - path: /etc/openab/config.toml
            template: *pod_config_reviewer
        env:
          CLAUDE_CODE_OAUTH_TOKEN:
            default: ${CLAUDE_CODE_OAUTH_TOKEN}
          OABCP_BOT_TOKEN:
            default: ${BOT_TOKEN_REV2}
          OABCP_BOT_NAME:
            default: rev2
          AWS_ACCESS_KEY_ID:
            default: ${STEERING_R2_ACCESS_KEY_ID}
          AWS_SECRET_ACCESS_KEY:
            default: ${STEERING_R2_SECRET_ACCESS_KEY}
          AWS_REGION:
            default: auto
