name: release

# Tag a version → test, then build + push the plane image to Docker Hub.
#   git tag v0.1.1 && git push origin v0.1.1   → pushes :0.1.1 and :latest
# Needs repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked

  image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: zeabur/openab-control-plane
          # v0.1.1 → tags 0.1.1 + latest (matches the template's :0.1.0 scheme)
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # ponytail: amd64 only (what Zeabur runs). Add linux/arm64 here when a
          # target needs it — QEMU arm64 Rust builds are slow, so not by default.
          cache-from: type=gha
          cache-to: type=gha,mode=max
