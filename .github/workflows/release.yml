name: release

# Tag a version → test, then build + push the plane image.
#   git tag v0.1.1 && git push origin v0.1.1   → pushes :0.1.1 and :latest
#
# Registry (#192 complete): images publish to GHCR only
# (ghcr.io/canyugs/openab-control-plane) — same-origin with the repo, authenticates
# with the built-in GITHUB_TOKEN (no external secret), and has no anonymous-pull
# rate limit. The Docker Hub dual-push (and the DOCKERHUB_* secrets) were dropped
# after both lanes + templates cut over to GHCR; tags ≤0.1.23 still exist on
# docker.io for rollback, but new tags are GHCR-only.
#   GHCR push needs the workflow `packages: write` permission below (no secret).
# NOTE: on the FIRST GHCR push the package is created private — flip it public
# (Settings → Packages, or `gh api`) so Zeabur pulls it without a pull secret.
#
# Multi-arch: amd64 (Zeabur) + arm64 (k8s on Graviton/Ampere/Apple Silicon),
# each built natively on its own runner — no QEMU — then stitched into one
# manifest by the `manifest` job. Per-arch tags (:X.Y.Z-amd64/-arm64) stay
# published as harmless build artifacts.
#
# Third-party actions are pinned to a full commit SHA (not a movable tag) to
# block supply-chain tampering — a tag can be force-moved to malicious code, a
# SHA can't. The trailing comment tracks the human-readable version; bump both
# together (or let Dependabot do it).
on:
  push:
    tags: ['v*']

# GHCR push authenticates with GITHUB_TOKEN; it needs packages:write. contents
# stays read (checkout only) — least privilege.
permissions:
  contents: read
  packages: write

env:
  GHCR_IMAGE: ghcr.io/canyugs/openab-control-plane

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --locked

  image:
    needs: test
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive version from tag
        # Guard against malformed manual tags (vfoo, v-bad) minting odd image
        # tags — fail here so neither arch pushes anything.
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$ ]] || {
            echo "tag '$GITHUB_REF_NAME' is not vX.Y.Z" >&2; exit 1; }
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          push: true
          platforms: linux/${{ matrix.arch }}
          tags: |
            ${{ env.GHCR_IMAGE }}:${{ env.VERSION }}-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  manifest:
    needs: image
    runs-on: ubuntu-24.04
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Stitch multi-arch manifest (:X.Y.Z + :latest)
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker buildx imagetools create \
            -t "${GHCR_IMAGE}:${VERSION}" \
            -t "${GHCR_IMAGE}:latest" \
            "${GHCR_IMAGE}:${VERSION}-amd64" \
            "${GHCR_IMAGE}:${VERSION}-arm64"
      - name: Verify both platforms present
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          out=$(docker buildx imagetools inspect "${GHCR_IMAGE}:${VERSION}")
          echo "== ${GHCR_IMAGE}:${VERSION} =="
          echo "$out"
          echo "$out" | grep -q 'linux/amd64' || { echo "missing linux/amd64" >&2; exit 1; }
          echo "$out" | grep -q 'linux/arm64' || { echo "missing linux/arm64" >&2; exit 1; }
