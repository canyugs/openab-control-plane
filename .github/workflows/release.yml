name: release

# Tag a version → test, then build + push the plane image to Docker Hub.
#   git tag v0.1.1 && git push origin v0.1.1   → pushes :0.1.1 and :latest
# Needs repo secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.
#
# Third-party actions are pinned to a full commit SHA (not a movable tag) to
# block supply-chain tampering — a tag can be force-moved to malicious code, a
# SHA can't. The trailing comment tracks the human-readable version; bump both
# together (or let Dependabot do it).
on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo test --locked

  image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        id: meta
        with:
          images: canyu/openab-control-plane
          # v0.1.1 → tags 0.1.1 + latest (matches the template's :0.1.0 scheme)
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # ponytail: amd64 only (what Zeabur runs). Add linux/arm64 here when a
          # target needs it — QEMU arm64 Rust builds are slow, so not by default.
          cache-from: type=gha
          cache-to: type=gha,mode=max
