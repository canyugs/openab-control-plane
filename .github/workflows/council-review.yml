name: Council Review

# Manual / fallback convene (PAT track). The automatic PR trigger has moved to the
# App-track webhook: the GitHub App delivers PR events straight to the plane's
# /api/v1/github_webhooks, which convenes the council (see src/council.rs). Keeping
# both on `pull_request` would double-convene the same PR, so this workflow is now
# manual-only (`workflow_dispatch`) — use it to re-review a PR on demand or as a
# fallback if the webhook is down. The chair posts the verdict from its pod
# (GH_TOKEN); this job only *convenes* via the plane's north API.
#
# Setup (repo secrets):
#   COUNCIL_PLANE  = https://<your-plane-domain>      (e.g. https://oab-council.zeabur.app)
#   COUNCIL_KEY    = the control-plane OABCP_API_KEY   (the `PASSWORD` var)
on:
  workflow_dispatch:
    inputs:
      pr:
        description: PR number to review
        required: true

concurrency:
  group: council-review-${{ github.event.pull_request.number || github.event.inputs.pr }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  convene:
    runs-on: ubuntu-latest
    # Fire-and-forget: this job convenes the council and exits — it does NOT wait
    # for the review. The council posts its verdict asynchronously as a PR comment
    # (the chair holds GH_TOKEN in its pod). The timeout only caps the convene call.
    timeout-minutes: 5
    # Fork PRs can't read the COUNCIL_KEY secret, so skip the event path for them
    # (same-repo PRs and manual dispatch still run). Mirrors openab's guard.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4
      - name: Open review council
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PLANE: ${{ secrets.COUNCIL_PLANE }}
          KEY: ${{ secrets.COUNCIL_KEY }}
          PR: ${{ github.event.pull_request.number || github.event.inputs.pr }}
        run: |
          set -euo pipefail
          # Soft-skip (not fail) when the secrets aren't visible — this run can't
          # review, but it shouldn't red-X the PR. Happens on a fresh install before
          # secrets are set, and on Dependabot PRs unless the same secrets are also
          # added with `gh secret set --app dependabot` (Dependabot runs can't read
          # regular Actions secrets).
          #
          # This keys on secret *absence*, not actor, so it is deliberately permissive:
          # council-review is an ADVISORY check (the real review is the chair's PR
          # comment), not a merge gate — a skipped run grants no privilege. If you make
          # council-review a *required* status check, tighten this to skip only for
          # `[ "$GITHUB_ACTOR" = "dependabot[bot]" ]` so other no-secret contexts
          # (forks, misconfig) still fail loudly.
          if [ -z "${PLANE:-}" ] || [ -z "${KEY:-}" ]; then
            echo "::notice::COUNCIL_PLANE / COUNCIL_KEY not set for this run — skipping council review"
            echo '> Council review skipped — secrets not configured for this run' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # PR is a workflow_dispatch input on the manual path — validate before it
          # reaches the shell (the pull_request path is already a trusted integer).
          [[ "${PR}" =~ ^[0-9]+$ ]] || { echo "::error::PR must be a number, got '${PR}'"; exit 1; }
          scripts/open-council.sh "${GITHUB_REPOSITORY}#${PR}"
