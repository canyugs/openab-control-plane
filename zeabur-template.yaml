# yaml-language-server: $schema=https://schema.zeabur.app/template.json
apiVersion: zeabur.com/v1
kind: Template
metadata:
  name: OpenAB Review Council
spec:
  description: |
    A self-hosted, CodeRabbit-style PR-review council: a control plane + 3 stock
    OpenAB Claude pods (1 chair + 2 reviewers) deliberate on a PR and post one
    verdict. Runs on your own Claude subscription (claude setup-token); no per-bot
    registration. After deploy, drop examples/pr-review.yml into your repo + set 2
    secrets to auto-review every PR. See docs/template.md.
  icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/github.svg
  tags:
    - AI
    - Developer Tools
  variables:
    - key: PUBLIC_DOMAIN
      type: DOMAIN
      name: Control plane domain
      description: Public domain for the control plane's REST/SSE API.
    - key: CLAUDE_CODE_OAUTH_TOKEN
      type: STRING
      name: Claude Code OAuth Token
      description: Agent auth for every pod. From `claude setup-token` (or use ANTHROPIC_API_KEY).
    - key: GH_TOKEN
      type: STRING
      name: GitHub Token (chair only, optional)
      description: Fine-grained PAT so the chair can comment/label/approve PRs. Leave blank to run without PR write-back.
  services:
    - name: control-plane
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/github.svg
      template: PREBUILT_V2
      domainKey: PUBLIC_DOMAIN
      spec:
        source:
          image: docker.io/canyu/openab-control-plane:0.1.9
        ports:
          - id: web
            port: 8090
            type: HTTP
        healthCheck:
          type: HTTP
          port: web
          http:
            path: /healthz
        volumes:
          - id: data
            dir: /data
        env:
          OABCP_ADDR:
            default: 0.0.0.0:8090
          OABCP_DB:
            default: /data/plane.db
          OABCP_API_KEY:
            default: ${PASSWORD}
            expose: true
            readonly: true
          OABCP_WS_URL:
            default: ws://control-plane.zeabur.internal:8090/ws
          OABCP_BOTS:
            default: chair:chair,rev1:reviewer,rev2:reviewer

    - name: chair
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/anthropic.svg
      template: PREBUILT_V2
      dependencies:
        - control-plane
      spec:
        source:
          image: ghcr.io/openabdev/openab:0.9.0-beta.3-claude
          command:
            - openab
            - run
            - -c
            - http://control-plane.zeabur.internal:8090/bot-config/chair
        # Persist HOME so an optional GitHub App upgrade (key on PV + the
        # bot-config pre_boot hook → gh auth login as the App) survives restarts.
        volumes:
          - id: home
            dir: /home/node
        env:
          CLAUDE_CODE_OAUTH_TOKEN:
            default: ${CLAUDE_CODE_OAUTH_TOKEN}
          # Out-of-box PR write-back uses this PAT. To upgrade to App identity
          # (zeabur-council[bot]): put the key on the volume + remove GH_TOKEN so
          # gh uses the App auth from the pre_boot hook instead of this env token.
          GH_TOKEN:
            default: ${GH_TOKEN}

    - name: rev1
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/anthropic.svg
      template: PREBUILT_V2
      dependencies:
        - control-plane
      spec:
        source:
          image: ghcr.io/openabdev/openab:0.9.0-beta.3-claude
          command:
            - openab
            - run
            - -c
            - http://control-plane.zeabur.internal:8090/bot-config/rev1
        env:
          CLAUDE_CODE_OAUTH_TOKEN:
            default: ${CLAUDE_CODE_OAUTH_TOKEN}

    - name: rev2
      icon: https://raw.githubusercontent.com/zeabur/service-icons/main/marketplace/anthropic.svg
      template: PREBUILT_V2
      dependencies:
        - control-plane
      spec:
        source:
          image: ghcr.io/openabdev/openab:0.9.0-beta.3-claude
          command:
            - openab
            - run
            - -c
            - http://control-plane.zeabur.internal:8090/bot-config/rev2
        env:
          CLAUDE_CODE_OAUTH_TOKEN:
            default: ${CLAUDE_CODE_OAUTH_TOKEN}
